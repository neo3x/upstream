<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Jira Mock — Upstream{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Manrope", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 28%),
                radial-gradient(circle at top right, rgba(14, 165, 233, 0.08), transparent 22%),
                linear-gradient(180deg, #f8fbff 0%, #f1f5f9 100%);
        }

        .font-tech { font-family: "JetBrains Mono", monospace; }
        .panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(148, 163, 184, 0.24);
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
        }
    </style>
</head>
<body class="min-h-screen">
    <header class="sticky top-0 z-20 border-b border-slate-200/70 bg-white/85 backdrop-blur-xl">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
            <div class="flex items-center gap-4">
                <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-slate-950 text-white shadow-lg shadow-blue-500/10">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M13 2 4 14h6l-1 8 11-14h-7l0-6Z"/>
                    </svg>
                </div>
                <div>
                    <p class="font-tech text-[11px] uppercase tracking-[0.28em] text-sky-700">Upstream</p>
                    <h1 class="text-lg font-extrabold tracking-tight text-slate-950">Jira Mock Board</h1>
                </div>
            </div>
            <div class="hidden items-center gap-2 md:flex">
                <a href="/" class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-slate-300 hover:bg-slate-50">Board</a>
                <a href="/docs" class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-slate-300 hover:bg-slate-50">API docs</a>
            </div>
        </div>
    </header>
    <main class="mx-auto max-w-7xl px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
