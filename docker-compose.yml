# Upstream Docker Compose

version: "3.9"

services:
  upstream_ui:
    build:
      context: services/ui
    ports:
      - "3000:3000"
    environment:
      AGENT_URL: ${UI_AGENT_URL:-http://host.docker.internal:8000}
      JIRA_MOCK_URL_EXTERNAL: ${JIRA_MOCK_URL_EXTERNAL:-http://localhost:3100}
      NOTIFICATION_MOCK_URL_EXTERNAL: ${NOTIFICATION_MOCK_URL_EXTERNAL:-http://localhost:3200}
      LANGFUSE_URL_EXTERNAL: ${LANGFUSE_URL_EXTERNAL:-http://localhost:3001}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      jira_mock:
        condition: service_healthy
      notification_mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  jira_mock:
    build:
      context: services/jira_mock
    ports:
      - "3100:3100"
    volumes:
      - jira_mock_data:/app/data
    environment:
      AGENT_WEBHOOK_URL: ${AGENT_WEBHOOK_URL:-http://upstream-agent:8000/webhooks/ticket-resolved}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  notification_mock:
    build:
      context: services/notification_mock
    ports:
      - "3200:3200"
    volumes:
      - notification_mock_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  jira_mock_data:
  notification_mock_data:
