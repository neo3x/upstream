<!DOCTYPE html>

            open

            <a href="/tickets/UPSTREAM-B5BD0C9A" class="block bg-slate-50 hover:bg-slate-100 p-3 rounded border border-slate-200 transition">

                    <span class="text-xs font-mono text-slate-500">UPSTREAM-B5BD0C9A</span>

    <div class="bg-white rounded-lg shadow p-4">

            resolved
